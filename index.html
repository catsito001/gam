    // Forzar re-scraping al compartir
    if(window.location.search.includes('ref=share')) {
        const timestamp = Date.now();
        document.querySelector('meta[property="og:image"]').content = `https://egamply.web.app/images/portada1.jpg?t=${timestamp}`;
    }
</script>



    <title>Inglés Interactivo</title>

<body>
    <div class="loading-screen">
        <div class="spinner"></div>
    </div>

    <section id="storiesList" style="display: none;"></section>

    <main class="story-view" id="storyView" style="display: none;">
        <div class="story-header">
            <button id="backToStoriesButton" class="back-button">
                <i class="icon ion-ios-arrow-back"></i>
            </button>
            <div class="header-content">
                <h1 id="storyTitle"></h1>
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress" id="progressBar"></div>
                    </div>
                    <span class="progress-text" id="progressText">0/0</span>
                </div>
            </div>
        </div>

        <div class="story-container">
            <div class="text-cards-container" id="textCardsContainer"></div>
        </div>

        <div class="bottom-controls">
            <div class="nav-controls">
                <button id="prevCardBtn" class="nav-button">
                    <i class="icon ion-ios-arrow-back"></i>
                </button>
                <button class="audio-main-button" id="mainAudioButton">
                    <i class="icon ion-ios-play"></i>
                </button>
                <button id="nextCardBtn" class="nav-button">
                    <i class="icon ion-ios-arrow-forward"></i>
                </button>
            </div>

            <div class="share-buttons">
            <button id="startGames" class="games-button">
                <i class="icon ion-ios-game-controller"></i>
                ACTIVIDADES Y JUEGOS
            </button>
            <button id="shareWhatsApp" class="share-button whatsapp">
                <i class="icon ion-logo-whatsapp"></i>
                COMPARTIR
            </button>
        </div>
        </div>
    </main>

    <section class="games-view" id="gamesView" style="display: none;">
        <div class="games-header">
            <button id="backToStory" class="back-button">
                <i class="icon ion-ios-arrow-back"></i>
            </button>
            <h2 id="gameTitle"></h2>
        </div>
        <div class="game-content" id="gameContent"></div>
    </section>
